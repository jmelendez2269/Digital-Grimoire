name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggers

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'Digital-Grimoire/app/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: Digital-Grimoire/app
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: Digital-Grimoire/app
        run: pnpm lint

      - name: Type check
        working-directory: Digital-Grimoire/app
        run: pnpm exec tsc --noEmit
        continue-on-error: true # Don't fail if typecheck isn't configured

      - name: 'notify vercel'
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: Vercel - digital-grimoire-96dg: Lint & Type Check

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'Digital-Grimoire/app/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: Digital-Grimoire/app
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        working-directory: Digital-Grimoire/app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: Digital-Grimoire/app/.next
          retention-days: 7

      - name: 'notify vercel'
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: Vercel - digital-grimoire-96dg: Build Application

  # Vercel handles deployment automatically via GitHub integration
  # This job is just for verification
  verify-deployment:
    name: Verify Deployment Ready
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: Digital-Grimoire/app/.next

      - name: Deployment status
        run: |
          echo "✅ Build successful - ready for deployment"
          echo "Branch: ${{ github.ref_name }}"
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "🚀 This will deploy to PRODUCTION (convergencelibrary.com)"
          else
            echo "🔧 This will deploy to PREVIEW (Vercel preview URL)"
          fi

