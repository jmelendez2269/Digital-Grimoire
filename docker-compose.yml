services:
  app:
    build:
      context: ./app
      target: dev
    container_name: digital-grimoire-app
    working_dir: /app
    env_file:
      - ./app/.env.local
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    stdin_open: true
    tty: true

volumes:
  app_node_modules:
  app_next:
